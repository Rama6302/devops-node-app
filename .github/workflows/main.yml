name: CI-CD-Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: OWASP Dependency Scan
        uses: dependency-check/Dependency-Check_Action@main
        with:
          # Define project name and scan parameters
          project: "devops-node-app"
          path: "."
          format: "HTML"

      - name: Build Docker Image
        # Define the image name and point to the current directory (Dockerfile location)
        # !!! CHANGE 'YOUR_DOCKERHUB_USERNAME' BELOW TO YOUR ACTUAL DOCKERHUB USERNAME !!!
        run: docker build -t YOUR_DOCKERHUB_USERNAME/devops-node-app:latest .

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          # Scan the image created in the previous step
          # !!! CHANGE 'YOUR_DOCKERHUB_USERNAME' BELOW TO YOUR ACTUAL DOCKERHUB USERNAME !!!
          image-ref: 'YOUR_DOCKERHUB_USERNAME/devops-node-app:latest'
          format: 'table'
          # If high or critical vulnerabilities are found, the build will fail.
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          # Use the secrets you configured in Phase 2
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Image to DockerHub
        # Push the final image to your DockerHub repository
        # !!! CHANGE 'YOUR_DOCKERHUB_USERNAME' BELOW TO YOUR ACTUAL DOCKERHUB USERNAME !!!
        run: docker push YOUR_DOCKERHUB_USERNAME/devops-node-app:latest
