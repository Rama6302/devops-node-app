name: CI-CD-Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: OWASP Dependency Scan
        uses: dependency-check/Dependency-Check_Action@main
        with:
          # Define project name and scan parameters
          project: "devops-node-app"
          path: "."
          format: "HTML"

      - name: Build Docker Image
        # !!! I have updated this line to use your all-lowercase Docker Hub username !!!
        # The syntax below uses the secret you already set up.
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/devops-node-app:latest .

      - name: Trivy Scan
        # Aquasecurity's Trivy tool scans the image for vulnerabilities.
        uses: aquasecurity/trivy-action@master
        with:
          # !!! I have updated this line to scan the correct image name !!!
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/devops-node-app:latest'
          format: 'table'
          # If high or critical vulnerabilities are found, the build will fail.
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Login to DockerHub
        # Re-use the DockerHub login action from image_3.png
        uses: docker/login-action@v3
        with:
          # Use the secrets you successfully set up in image_5.png
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Image to DockerHub
        # !!! I have updated this line to push to your specific repository !!!
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/devops-node-app:latest
